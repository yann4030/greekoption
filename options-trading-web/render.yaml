services:
  - type: web
    name: yann-option-tools-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: yann-option-tools-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: yann-option-tools-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://yann-option-tools.vercel.app,http://localhost:3000"

databases:
  - name: yann-option-tools-db
    databaseName: option_tools
    user: option_user

redis:
  - name: yann-option-tools-redis
    ipAllowList: []
