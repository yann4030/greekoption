services:
  - type: web
    name: greekoption-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: greekoption-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: greekoption-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://greekoption.vercel.app,http://localhost:3000"

databases:
  - name: greekoption-db
    databaseName: greekoption
    user: greekoption_user

redis:
  - name: greekoption-redis
    ipAllowList: []
