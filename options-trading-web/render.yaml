services:
  - type: web
    name: options-trading-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: options-trading-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: options-trading-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://options-trading.vercel.app,http://localhost:3000"

databases:
  - name: options-trading-db
    databaseName: options_trading
    user: options_user

redis:
  - name: options-trading-redis
    ipAllowList: []
