<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期权交易分析工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><h1>期权工具</h1></div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="dashboard">行情看板</a>
                <a href="#" class="nav-item" data-page="calculator">期权计算器</a>
                <a href="#" class="nav-item" data-page="strategy">策略分析</a>
                <a href="#" class="nav-item" data-page="portfolio">持仓管理</a>
                <a href="#" class="nav-item" data-page="greeks">Greeks分析</a>
            </nav>
        </aside>
        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <input type="text" placeholder="输入股票代码，如: 510050" id="stockSearch">
                    <button id="searchBtn">查询</button>
                </div>
                <div class="user-info">
                    <span id="marketStatus" class="status-closed">未连接</span>
                    <span id="currentTime"></span>
                </div>
            </header>
            <div class="page-content">
                                <section id="dashboard" class="page active">
                    <h2>行情看板</h2>
                    
                    <!-- 实时交易推荐 -->
                    <div class="card" style="margin-bottom: 20px; border: 2px solid var(--primary-color);">
                        <h3 style="color: var(--primary-color);">🎯 实时交易推荐</h3>
                        <div id="realtimeRecommendations">
                            <p style="text-align: center; padding: 20px; color: var(--text-secondary);">
                                正在加载实时数据...
                            </p>
                        </div>
                    </div>
                    
                    <div class="dashboard-grid">
                        <div class="card">
                            <h3>标的资产</h3>
                            <div class="asset-info">
                                <div class="asset-name" id="assetName">--</div>
                                <div class="asset-price">
                                    <span class="price" id="assetPrice">--</span>
                                    <span class="change" id="assetChange">--</span>
                                </div>
                                <div class="asset-detail">
                                    <span>最高: <b id="assetHigh">--</b></span>
                                    <span>最低: <b id="assetLow">--</b></span>
                                    <span>成交量: <b id="assetVolume">--</b></span>
                                </div>
                            </div>
                        </div>
                        <div class="card">
                            <h3>期权链 <span id="optionExpiry">--</span></h3>
                            <div class="option-chain-header">
                                <span>行权价</span>
                                <span>看涨(买/卖)</span>
                                <span>看跌(买/卖)</span>
                            </div>
                            <div class="option-chain-list" id="optionChain"></div>
                        </div>
                        <div class="card">
                            <h3>波动率指数</h3>
                            <div class="vix-display">
                                <span class="vix-value" id="vixValue">--</span>
                                <span class="vix-label">中国波指(iVIX)</span>
                            </div>
                        </div>
                    </div>
                </section>
                <section id="calculator" class="page">
                    <h2>期权定价计算器 (Black-Scholes)</h2>
                    <div class="calc-container">
                        <div class="calc-inputs card">
                            <h3>参数输入</h3>
                            <div class="input-group">
                                <label>标的现价 (S)</label>
                                <input type="number" id="spotPrice" value="100" step="0.001">
                            </div>
                            <div class="input-group">
                                <label>行权价 (K)</label>
                                <input type="number" id="strikePrice" value="100" step="0.001">
                            </div>
                            <div class="input-group">
                                <label>到期时间 (T, 年)</label>
                                <input type="number" id="timeToExpiry" value="0.25" step="0.01">
                            </div>
                            <div class="input-group">
                                <label>无风险利率 (r, %)</label>
                                <input type="number" id="riskFreeRate" value="3" step="0.1">
                            </div>
                            <div class="input-group">
                                <label>波动率 (sigma, %)</label>
                                <input type="number" id="volatility" value="20" step="0.1">
                            </div>
                            <div class="input-group">
                                <label>期权类型</label>
                                <select id="optionType">
                                    <option value="call">看涨期权 (Call)</option>
                                    <option value="put">看跌期权 (Put)</option>
                                </select>
                            </div>
                            <button id="calcBtn" class="btn-primary">计算</button>
                        </div>
                        <div class="calc-results card">
                            <h3>计算结果</h3>
                            <div class="result-grid">
                                <div class="result-item"><span class="label">期权价格</span><span class="value" id="optionPrice">--</span></div>
                                <div class="result-item"><span class="label">Delta</span><span class="value" id="delta">--</span></div>
                                <div class="result-item"><span class="label">Gamma</span><span class="value" id="gamma">--</span></div>
                                <div class="result-item"><span class="label">Theta (每日)</span><span class="value" id="theta">--</span></div>
                                <div class="result-item"><span class="label">Vega</span><span class="value" id="vega">--</span></div>
                                <div class="result-item"><span class="label">Rho</span><span class="value" id="rho">--</span></div>
                            </div>
                        </div>
                    </div>
                </section>
                <section id="strategy" class="page">
                    <h2>期权策略分析</h2>
                    <div class="strategy-container">
                        <div class="strategy-list card">
                            <h3>选择策略</h3>
                            <div class="strategy-buttons">
                                <button class="strategy-btn active" data-strategy="long-call">买入看涨 (Long Call)</button>
                                <button class="strategy-btn" data-strategy="long-put">买入看跌 (Long Put)</button>
                                <button class="strategy-btn" data-strategy="bull-call">牛市看涨价差 (Bull Call)</button>
                                <button class="strategy-btn" data-strategy="straddle">买入跨式 (Long Straddle)</button>
                            </div>
                        </div>
                        <div class="strategy-chart card"><h3>盈亏图</h3><canvas id="payoffChart"></canvas></div>
                    </div>
                </section>
                <section id="portfolio" class="page"><h2>持仓管理</h2><div class="portfolio-container"><div class="card"><h3>持仓概览</h3></div></div></section>
                <section id="greeks" class="page"><h2>Greeks风险分析</h2><div class="greeks-container"><div class="card"><h3>组合Greeks</h3></div></div></section>
            </div>
        </main>
    </div>
    <script src="market-data.js"></script>
    <script src="trading-recommender.js"></script>
    <script src="app.js"></script>
</body>
</html>
